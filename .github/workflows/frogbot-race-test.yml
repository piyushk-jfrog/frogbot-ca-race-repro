name: Frogbot Race Condition Test
on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  frogbot-scan-1:
    runs-on: ubuntu-latest
    environment: frogbot
    outputs:
      scan_outcome: ${{ steps.scan1.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Run Frogbot PR Scan (Run 1 - Cold Cache)
        id: scan1
        continue-on-error: true
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_FAIL: "true"

      - name: Record Run 1 Result
        if: always()
        run: |
          echo "============================================"
          echo "RUN 1 STEP OUTCOME: ${{ steps.scan1.outcome }}"
          echo "============================================"

  frogbot-scan-2:
    runs-on: ubuntu-latest
    needs: frogbot-scan-1
    environment: frogbot
    outputs:
      scan_outcome: ${{ steps.scan2.outcome }}
    steps:
      - name: Wait 120s for CA data to settle in Xray
        run: |
          echo "Waiting 120 seconds for Contextual Analysis data to be persisted..."
          sleep 120

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Run Frogbot PR Scan (Run 2 - Warm Cache)
        id: scan2
        continue-on-error: true
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_FAIL: "true"

      - name: Record Run 2 Result
        if: always()
        run: |
          echo "============================================"
          echo "RUN 2 STEP OUTCOME: ${{ steps.scan2.outcome }}"
          echo "============================================"

  compare-results:
    runs-on: ubuntu-latest
    needs: [frogbot-scan-1, frogbot-scan-2]
    if: always()
    steps:
      - name: Compare Scan Results
        run: |
          RUN1="${{ needs.frogbot-scan-1.outputs.scan_outcome }}"
          RUN2="${{ needs.frogbot-scan-2.outputs.scan_outcome }}"
          echo "============================================"
          echo "RACE CONDITION TEST RESULTS"
          echo "============================================"
          echo "Run 1 (Cold Cache) step outcome: $RUN1"
          echo "Run 2 (Warm Cache) step outcome: $RUN2"
          echo "============================================"
          if [ "$RUN1" = "failure" ] && [ "$RUN2" = "success" ]; then
            echo "🔴 RACE CONDITION CONFIRMED!"
            echo "Run 1 FAILED (violations on cold cache / no CA data)"
            echo "Run 2 PASSED (CA data settled, violations filtered)"
            exit 1
          elif [ "$RUN1" = "success" ] && [ "$RUN2" = "success" ]; then
            echo "✅ NO RACE CONDITION - Both runs passed"
          elif [ "$RUN1" = "failure" ] && [ "$RUN2" = "failure" ]; then
            echo "⚠️  BOTH FAILED - Violations persistent (CVEs likely Not Covered by CA)"
          else
            echo "❓ UNEXPECTED: Run1=$RUN1 Run2=$RUN2 - Investigate logs"
          fi
